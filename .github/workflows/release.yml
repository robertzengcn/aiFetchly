name: Auto Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.calculate_version.outputs.version }}
      artifact-name: ${{ steps.calculate_version.outputs.artifact_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.18.3

      # Python 3.12+ removed distutils; bundled node-gyp in electron-rebuild still imports it.
      - name: Set up Python for node-gyp
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Calculate version
        id: calculate_version
        run: |
          # Extract current version from package.json
          CURRENT_VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "Current version: $CURRENT_VERSION"
          
          # Generate build number based on GitHub run number
          BUILD_NUMBER=${{ github.run_number }}
          
          # Create new version with build number
          NEW_VERSION="${CURRENT_VERSION%.*}.$BUILD_NUMBER"
          echo "New version: $NEW_VERSION"
          
          # Update package.json with new version
          node -e "const pkg = require('./package.json'); pkg.version = '$NEW_VERSION'; require('fs').writeFileSync('./package.json', JSON.stringify(pkg, null, 2))"
          
          # Set as output variables
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "artifact_name=electron-app-windows-v$NEW_VERSION" >> $GITHUB_OUTPUT
        shell: bash

      - name: Create .env file
        run: |
          touch .env
          echo "NODE_ENV=test" >> .env
          echo "VITE_LOGIN_URL=${{ secrets.VITE_LOGIN_URL_TEST }}" >> .env
          echo "UPDATESERVER=${{ secrets.UPDATESERVER }}" >> .env
          cat .env

      - name: Install dependencies
        run: yarn install

      - name: Rebuild electron
        run: yarn electron-rebuild --force --types prod,dev,optional --module-dir .

      - name: Rebuild sqlite3
        run: yarn rebuild-sqlite3

      - name: Rebuild better sqlite
        run: yarn rebuild-better-sqlite

      - name: Install WiX Toolset
        run: |
          Invoke-WebRequest -Uri https://github.com/wixtoolset/wix3/releases/download/wix3112rtm/wix311-binaries.zip -OutFile wix.zip
          Expand-Archive -Path wix.zip -DestinationPath "$env:ProgramFiles\WiX Toolset"
          Remove-Item -Force wix.zip
        shell: pwsh

      - name: Build application
        run: yarn make-win:test

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.calculate_version.outputs.artifact_name }}
          path: out/make

  build-macos:
    runs-on: macos-latest
    outputs:
      version: ${{ steps.calculate_version.outputs.version }}
      artifact-name: ${{ steps.calculate_version.outputs.artifact_name }}

    steps:
      - name: Set up C++20 environment
        run: |
          ARCH="$(uname -m)"
          echo "Detected host architecture: ${ARCH}"
          if [ "$ARCH" = "arm64" ]; then
            TARGET_ARCH="arm64"
            ARCH_FLAGS="-arch arm64"
            HOMEBREW_PREFIX="/opt/homebrew"
          else
            TARGET_ARCH="x86_64"
            ARCH_FLAGS="-arch x86_64"
            HOMEBREW_PREFIX="/usr/local"
          fi
          echo "Using target architecture: ${TARGET_ARCH}"
          echo "ARCH_FLAGS=${ARCH_FLAGS}" >> $GITHUB_ENV
          echo "TARGET_ARCH=${TARGET_ARCH}" >> $GITHUB_ENV
          echo "HOMEBREW_PREFIX=${HOMEBREW_PREFIX}" >> $GITHUB_ENV
          echo "CXXFLAGS=-std=c++20 ${ARCH_FLAGS}" >> $GITHUB_ENV
          echo "CFLAGS=-std=c11 ${ARCH_FLAGS}" >> $GITHUB_ENV
          echo "CXX=clang++" >> $GITHUB_ENV
          echo "CC=clang" >> $GITHUB_ENV
          echo "LDFLAGS=-std=c++20 ${ARCH_FLAGS}" >> $GITHUB_ENV

      - name: Select available Xcode version
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.18.3

      # Python 3.12+ removed distutils; bundled node-gyp in electron-rebuild still imports it.
      - name: Set up Python for node-gyp
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Calculate version
        id: calculate_version
        run: |
          # Extract current version from package.json
          CURRENT_VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "Current version: $CURRENT_VERSION"

          # Generate build number based on GitHub run number
          BUILD_NUMBER=${{ github.run_number }}

          # Create new version with build number
          NEW_VERSION="${CURRENT_VERSION%.*}.$BUILD_NUMBER"
          echo "New version: $NEW_VERSION"

          # Update package.json with new version
          node -e "const pkg = require('./package.json'); pkg.version = '$NEW_VERSION'; require('fs').writeFileSync('./package.json', JSON.stringify(pkg, null, 2))"

          # Set as output variables
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "artifact_name=electron-app-macos-v$NEW_VERSION" >> $GITHUB_OUTPUT
        shell: bash

      - name: Create .env file
        run: |
          touch .env
          echo "NODE_ENV=test" >> .env
          echo "VITE_LOGIN_URL=${{ secrets.VITE_LOGIN_URL_TEST }}" >> .env
          echo "UPDATESERVER=${{ secrets.UPDATESERVER }}" >> .env
          cat .env

      - name: Install setuptools
        run: brew install python-setuptools

      - name: Install system dependencies for native modules
        run: brew install xz pkg-config

      - name: Install dependencies
        run: yarn install

      - name: Rebuild native modules with C++20
        run: |
          # Ensure C++20 is used for all native module builds
          export CFLAGS="-std=c11 ${ARCH_FLAGS}"
          export CXXFLAGS="-std=c++20 ${ARCH_FLAGS}"
          export LDFLAGS="-std=c++20 ${ARCH_FLAGS}"
          export npm_config_target="35.7.5"
          export npm_config_disturl="https://electronjs.org/headers"

          # Rebuild with proper C++20 support
          npx electron-rebuild --force --arch="${TARGET_ARCH}" --types prod,dev,optional --module-dir . || {
            echo "Full rebuild failed, trying selective rebuild..."
            npx electron-rebuild --force --arch="${TARGET_ARCH}" -w better-sqlite3,sqlite3,bufferutil,utf-8-validate || echo "Selective rebuild failed"
          }

      - name: Rebuild sqlite3
        run: CXXFLAGS="-std=c++20" CFLAGS="-std=c11" yarn rebuild-sqlite3

      - name: Rebuild better sqlite
        run: CXXFLAGS="-std=c++20" CFLAGS="-std=c11" yarn rebuild-better-sqlite

      - name: Build application
        run: yarn make-mac:test

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.calculate_version.outputs.artifact_name }}
          path: out/make

  create-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.18.3

      - name: Calculate version
        id: calculate_version
        run: |
          # Extract current version from package.json
          CURRENT_VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "Current version: $CURRENT_VERSION"
          
          # Generate build number based on GitHub run number
          BUILD_NUMBER=${{ github.run_number }}
          
          # Create new version with build number
          NEW_VERSION="${CURRENT_VERSION%.*}.$BUILD_NUMBER"
          echo "New version: $NEW_VERSION"
          
          # Set as output variable
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: electron-app-windows-v${{ steps.calculate_version.outputs.version }}
          path: ./windows-build

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: electron-app-macos-v${{ steps.calculate_version.outputs.version }}
          path: ./macos-build

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.calculate_version.outputs.version }}
          name: Release v${{ steps.calculate_version.outputs.version }}
          body: |
            ## What's Changed
            
            Auto-generated release for version ${{ steps.calculate_version.outputs.version }}
            
            ### Downloads
            - Windows: Download the Windows installer from the assets below
            - macOS: Download the macOS app from the assets below
            
            ### Build Info
            - Build Number: ${{ github.run_number }}
            - Commit: ${{ github.sha }}
            - Branch: ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            ./windows-build/**/*
            ./macos-build/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 