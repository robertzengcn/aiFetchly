## Data Types

### ContactInfo

```yaml
ContactInfo:
  type: object
  properties:
    email:
      type: string
      format: email
      nullable: true
      description: Primary email address
    phone:
      type: string
      nullable: true
      description: Primary phone number
    address:
      type: string
      nullable: true
      description: Physical address
    socialLinks:
      type: array
      items:
        type: string
        format: uri
      nullable: true
      description: Social media URLs
```

### ExtractionStatus

```yaml
ExtractionStatus:
  type: string
  enum: [pending, analyzing, completed, failed]
  description: Current status of extraction
```

### ExtractionMethod

```yaml
ExtractionMethod:
  type: string
  enum: [stage1_homepage, stage2_heuristic, stage3_fallback, stage4_ai, failed]
  description: Which discovery stage succeeded
```

---

## Error Responses

All endpoints may return error responses in this format:

```yaml
error:
  type: object
  properties:
    success:
      type: boolean
      enum: [false]
    message:
      type: string
    code:
      type: integer
      description: Error code
    details:
      type: object
      description: Additional error details
  required:
    - success
    - message
```

### Common Error Codes

| Code | Description |
|------|-------------|
| 4001 | Invalid request (missing/invalid parameters) |
| 4002 | Search results not found |
| 4003 | Worker process not available |
| 4004 | Database error |
| 4005 | Extraction already in progress |
| 5000 | Internal server error |

---

## Rate Limiting

- Max 50 result IDs per request
- Max 5 concurrent batch extractions
- Retry requests have higher priority

---

## Security

- All requests are internal (Electron IPC)
- Input validation required for all parameters
- Sanitization before database storage
- No sensitive data in error messages

---

