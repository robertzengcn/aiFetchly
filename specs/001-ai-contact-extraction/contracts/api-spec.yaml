| Endpoint | Type | Purpose | Timeout |
|----------|------|---------|---------|
| `start-contact-extraction` | Invoke | Start batch extraction | 5000ms |
| `get-contact-info` | Invoke | Query contact data | 3000ms |
| `retry-contact-extraction` | Invoke | Retry failed items | 5000ms |
| `contact-extraction-progress` | Event | Progress updates | N/A |

**Total Endpoints**: 4 (3 invoke handlers, 1 event)

