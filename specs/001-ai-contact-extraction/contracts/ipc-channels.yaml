# IPC Channel Definitions: Contact Extraction

**Feature**: 001-ai-contact-extraction
**Purpose**: Define IPC communication channels for contact extraction feature
**Format**: YAML specification for Electron IPC handlers

## Channel Naming Convention

Channels follow the pattern: `FEATURE_ACTION` (kebab-case)
- `start-contact-extraction`: Invoke handler
- `contact-extraction-progress`: Event (one-way communication)
- `get-contact-info`: Query handler
- `retry-contact-extraction`: Invoke handler

---

## Channels

### 1. start-contact-extraction

**Type**: IPC Invoke Handler (renderer → main)
**Purpose**: Initiate batch contact extraction for selected search results
**Direction**: Renderer sends request, Main process responds

#### Request

```typescript
interface StartContactExtractionRequest {
  resultIds: number[];  // Array of search result IDs to extract
}
```

#### Response

```typescript
interface StartContactExtractionResponse {
  success: boolean;
  batchId?: string;      // UUID for tracking this batch
  message?: string;      // Success or error message
}
```

#### Example

**Renderer**:
```typescript
const response = await ipcRenderer.invoke('start-contact-extraction', {
  resultIds: [1, 2, 3, 4, 5]
});
// Returns: { success: true, batchId: 'abc-123-def', message: 'Extraction started' }
```

#### Handler Location

**File**: `src/main-process/communication/contactExtraction-ipc.ts`

```typescript
ipcMain.handle('start-contact-extraction', async (event, request) => {
  try {
    const { resultIds } = request;

    // Validate input
    if (!Array.isArray(resultIds) || resultIds.length === 0) {
      return { success: false, message: 'Invalid result IDs' };
    }

    // Fetch search results from database
    const results = await fetchSearchResults(resultIds);

    // Send to worker process
    worker.send({
      type: 'extract-contact',
      batchId: generateUUID(),
      resultIds,
      results
    });

    return { success: true, batchId, message: 'Extraction started' };
  } catch (error) {
    return { success: false, message: error.message };
  }
});
```

