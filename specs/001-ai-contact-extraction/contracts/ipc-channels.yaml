## Error Handling

### Common Error Responses

All IPC handlers should return consistent error responses:

```typescript
interface ErrorResponse {
  success: false;
  message: string;
  code?: number;      // Optional error code
  details?: any;      // Optional error details
}
```

### Error Codes

| Code | Description |
|------|-------------|
| 4001 | Invalid request (missing/invalid parameters) |
| 4002 | Search results not found |
| 4003 | Worker process not available |
| 4004 | Database error |
| 4005 | Extraction already in progress |

### Example Error Response

```typescript
{
  success: false,
  message: 'Search results not found',
  code: 4002,
  details: { resultIds: [999, 1000] }
}
```

---

## Security Considerations

1. **Input Validation**: Always validate `resultIds` array
2. **Authorization**: Ensure user has permission to access search results
3. **Rate Limiting**: Limit extraction requests to prevent abuse
4. **Sanitization**: Sanitize all data before saving to database
5. **Error Messages**: Don't expose sensitive information in error messages

