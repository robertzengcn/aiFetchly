### 3. get-contact-info

**Type**: IPC Invoke Handler (renderer → main)
**Purpose**: Query contact information for specific search results
**Direction**: Renderer sends request, Main process responds with data

#### Request

```typescript
interface GetContactInfoRequest {
  resultIds: number[];  // Array of search result IDs
}
```

#### Response

```typescript
interface GetContactInfoResponse {
  success: boolean;
  data?: Array<{
    resultId: number;
    email?: string | null;
    phone?: string | null;
    address?: string | null;
    socialLinks?: string[] | null;
    extractionStatus: string;
    extractionError?: string | null;
    extractionDate?: string;
  }>;
  message?: string;
}
```

#### Example

**Renderer**:
```typescript
const response = await ipcRenderer.invoke('get-contact-info', {
  resultIds: [1, 2, 3]
});
// Returns: {
//   success: true,
//   data: [
//     { resultId: 1, email: 'info@example.com', phone: '+1-555-1234', extractionStatus: 'completed' },
//     { resultId: 2, email: null, phone: null, extractionStatus: 'failed', extractionError: 'No contact info found' },
//     { resultId: 3, email: null, phone: null, extractionStatus: 'pending' }
//   ]
// }
```

#### Handler Location

**File**: `src/main-process/communication/contactExtraction-ipc.ts`

```typescript
ipcMain.handle('get-contact-info', async (event, request) => {
  try {
    const { resultIds } = request;

    const contactInfoList = await dataSource.getRepository(ContactInfoEntity)
      .createQueryBuilder('contactInfo')
      .where('contactInfo.resultId IN (:...resultIds)', { resultIds })
      .getMany();

    return {
      success: true,
      data: contactInfoList.map(ci => ({
        resultId: ci.resultId,
        email: ci.email,
        phone: ci.phone,
        address: ci.address,
        socialLinks: ci.socialLinks,
        extractionStatus: ci.extractionStatus,
        extractionError: ci.extractionError,
        extractionDate: ci.extractionDate?.toISOString()
      }))
    };
  } catch (error) {
    return { success: false, message: error.message };
  }
});
```

