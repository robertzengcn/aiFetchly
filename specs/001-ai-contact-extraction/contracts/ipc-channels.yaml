### 2. contact-extraction-progress

**Type**: IPC Event (worker → main → renderer)
**Purpose**: Real-time progress updates during extraction
**Direction**: Worker sends to main, Main forwards to renderer (one-way)

#### Event Data

```typescript
interface ContactExtractionProgressEvent {
  batchId: string;
  resultId: number;
  status: 'pending' | 'analyzing' | 'completed' | 'failed';
  data?: {
    email?: string;
    phone?: string;
    address?: string;
    socialLinks?: string[];
  };
  error?: string;
  method?: string;  // 'stage1_homepage', 'stage2_heuristic', etc.
}
```

#### Example

**Worker Process**:
```typescript
process.send?.({
  type: 'extraction-progress',
  batchId: 'abc-123-def',
  resultId: 1,
  status: 'completed',
  data: {
    email: 'info@example.com',
    phone: '+1-555-1234',
    address: '123 Main St, San Francisco, CA'
  },
  method: 'stage2_heuristic'
});
```

**Main Process** (forwards to renderer):
```typescript
worker.on('message', (message) => {
  if (message.type === 'extraction-progress') {
    const mainWindow = BrowserWindow.getFocusedWindow();
    mainWindow?.webContents.send('contact-extraction-progress', message);
  }
});
```

**Renderer** (listens for updates):
```typescript
ipcRenderer.on('contact-extraction-progress', (_event, progress) => {
  console.log('Extraction progress:', progress);
  // Update UI with new data
});
```

