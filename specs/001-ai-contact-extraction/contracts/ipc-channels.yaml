## Summary

| Channel | Type | Purpose | Direction |
|---------|------|---------|-----------|
| `start-contact-extraction` | Invoke | Start batch extraction | Renderer → Main |
| `contact-extraction-progress` | Event | Progress updates | Worker → Main → Renderer |
| `get-contact-info` | Invoke | Query contact data | Renderer → Main → Renderer |
| `retry-contact-extraction` | Invoke | Retry failed extractions | Renderer → Main |

**Total Channels**: 4 (2 invoke handlers, 1 event, 1 retry handler)

