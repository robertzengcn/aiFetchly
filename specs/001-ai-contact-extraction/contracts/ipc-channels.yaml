## Testing

### Unit Tests (Vitest)

**File**: `test/vitest/main/contactExtraction-ipc.test.ts`

```typescript
import { ipcMain } from 'electron';
import { registerContactExtractionHandlers } from '@/main-process/communication/contactExtraction-ipc';
import { mock } from 'vitest-mock-extended';

describe('Contact Extraction IPC', () => {
  beforeEach(() => {
    registerContactExtractionHandlers();
  });

  it('should start extraction with valid result IDs', async () => {
    const response = await ipcMain.handle('start-contact-extraction', {
      resultIds: [1, 2, 3]
    });
    expect(response.success).toBe(true);
    expect(response.batchId).toBeDefined();
  });

  it('should reject extraction with empty result IDs', async () => {
    const response = await ipcMain.handle('start-contact-extraction', {
      resultIds: []
    });
    expect(response.success).toBe(false);
    expect(response.message).toContain('Invalid result IDs');
  });

  it('should return contact info for valid result IDs', async () => {
    const response = await ipcMain.handle('get-contact-info', {
      resultIds: [1, 2, 3]
    });
    expect(response.success).toBe(true);
    expect(response.data).toHaveLength(3);
  });
});
```

