### 4. retry-contact-extraction

**Type**: IPC Invoke Handler (renderer → main)
**Purpose**: Retry failed extractions for specific search results
**Direction**: Renderer sends request, Main process responds

#### Request

```typescript
interface RetryContactExtractionRequest {
  resultIds: number[];  // Array of search result IDs to retry
}
```

#### Response

```typescript
interface RetryContactExtractionResponse {
  success: boolean;
  batchId?: string;
  message?: string;
}
```

#### Example

**Renderer**:
```typescript
const response = await ipcRenderer.invoke('retry-contact-extraction', {
  resultIds: [2, 5, 8]  // Previously failed items
});
// Returns: { success: true, batchId: 'xyz-789-uvw', message: 'Retry initiated' }
```

#### Handler Location

**File**: `src/main-process/communication/contactExtraction-ipc.ts`

```typescript
ipcMain.handle('retry-contact-extraction', async (event, request) => {
  try {
    const { resultIds } = request;

    // Delete existing contact info (reset for re-extraction)
    await dataSource.getRepository(ContactInfoEntity)
      .delete({ resultId: In(resultIds) });

    // Fetch search results
    const results = await fetchSearchResults(resultIds);

    // Send to worker with higher priority
    worker.send({
      type: 'extract-contact',
      batchId: generateUUID(),
      resultIds,
      results,
      priority: 10 // Higher priority for retries
    });

    return { success: true, batchId, message: 'Retry initiated' };
  } catch (error) {
    return { success: false, message: error.message };
  }
});
```

